<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Visual Editor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#0f1117;--bg-surface:#181a24;--bg-panel:#1e2030;--bg-elevated:#252839;
  --border:#2a2d3e;--border-hover:#3d4158;
  --text:#e4e6f0;--text-muted:#8b8fa8;--text-dim:#5c6078;
  --accent:#22d3a7;--accent-glow:rgba(34,211,167,.15);--accent-hover:#1bb892;
  --danger:#f0475c;--warning:#f0a847;--info:#4799f0;
  --code-bg:#141620;
  --radius:8px;--radius-lg:12px;
  --font-ui:"SF Pro Display","Segoe UI","Helvetica Neue",system-ui,sans-serif;
  --font-code:"SF Mono","Cascadia Code","Fira Code","JetBrains Mono","Consolas",monospace;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --transition:all .2s cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg-deep:#f0f1f5;--bg-surface:#f8f9fc;--bg-panel:#ffffff;--bg-elevated:#ecedf2;
  --border:#d8dae3;--border-hover:#c0c3d0;
  --text:#1a1c28;--text-muted:#6b6e82;--text-dim:#9b9eb2;
  --accent:#0fa882;--accent-glow:rgba(15,168,130,.1);--accent-hover:#0d9474;
  --danger:#d93a4e;--warning:#d49338;--info:#3a84d9;
  --code-bg:#f0f1f5;
  --shadow:0 4px 24px rgba(0,0,0,.08);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font-ui);background:var(--bg-deep);color:var(--text);
  display:flex;flex-direction:column;
}

/* ═══ TOOLBAR ═══ */
.toolbar{
  display:flex;align-items:center;gap:6px;padding:8px 12px;
  background:var(--bg-surface);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:100;flex-wrap:wrap;
}
.toolbar-brand{
  font-weight:700;font-size:15px;letter-spacing:-.3px;
  color:var(--accent);margin-right:8px;white-space:nowrap;
  display:flex;align-items:center;gap:6px;
}
.toolbar-brand svg{width:20px;height:20px}
.toolbar-sep{width:1px;height:24px;background:var(--border);margin:0 4px;flex-shrink:0}
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg-panel);color:var(--text);font-size:12.5px;font-family:var(--font-ui);
  cursor:pointer;transition:var(--transition);white-space:nowrap;
  font-weight:500;
}
.btn:hover{border-color:var(--accent);background:var(--accent-glow);color:var(--accent)}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary{background:var(--accent);color:#0f1117;border-color:var(--accent);font-weight:600}
.btn.primary:hover{background:var(--accent-hover)}
.btn.danger{border-color:var(--danger);color:var(--danger)}
.btn.danger:hover{background:var(--danger);color:#fff}
.btn svg{width:15px;height:15px;flex-shrink:0}
.btn-group{display:flex;gap:0}
.btn-group .btn{border-radius:0}
.btn-group .btn:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.btn-group .btn:last-child{border-radius:0 var(--radius) var(--radius) 0}
.btn-group .btn+.btn{border-left:0}

/* ═══ MAIN AREA ═══ */
.main{display:flex;flex:1;overflow:hidden;position:relative}
.panel{
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .3s cubic-bezier(.4,0,.2,1),flex .3s cubic-bezier(.4,0,.2,1);
}
.panel-code{
  width:50%;border-right:1px solid var(--border);background:var(--code-bg);
}
.panel-preview{flex:1;background:var(--bg-panel);position:relative}
.panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px;background:var(--bg-surface);border-bottom:1px solid var(--border);
  font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;
  color:var(--text-muted);flex-shrink:0;
}
.panel-header span{display:flex;align-items:center;gap:4px}

/* ═══ CODE EDITOR ═══ */
.code-wrap{flex:1;display:flex;overflow:hidden;position:relative;clip:rect(0,auto,auto,0)}
.line-numbers{
  width:44px;padding:12px 8px 12px 4px;text-align:right;
  font-family:var(--font-code);font-size:12px;line-height:1.6;
  color:var(--text-dim);background:var(--bg-surface);
  overflow:hidden;user-select:none;flex-shrink:0;border-right:1px solid var(--border);
}
#codeEditor{
  flex:1;padding:12px;border:none;outline:none;resize:none;
  font-family:var(--font-code);font-size:12.5px;line-height:1.6;
  color:var(--text);background:transparent;
  tab-size:2;white-space:pre;overflow:auto;
}
#codeEditor::placeholder{color:var(--text-dim)}

/* ═══ PREVIEW ═══ */
.preview-container{flex:1;display:flex;justify-content:center;overflow:auto;background:var(--bg-elevated);padding:0}
.preview-frame-wrap{
  width:100%;height:100%;transition:width .3s ease;
  position:relative;background:#fff;
}
.preview-frame-wrap.tablet{max-width:768px;margin:16px auto;border-radius:var(--radius-lg);box-shadow:var(--shadow)}
.preview-frame-wrap.mobile{max-width:375px;margin:16px auto;border-radius:var(--radius-lg);box-shadow:var(--shadow)}
#previewFrame{width:100%;height:100%;border:none;display:block}

/* ═══ RESIZER ═══ */
.resizer{
  width:5px;cursor:col-resize;background:var(--border);
  transition:background .2s;flex-shrink:0;position:relative;z-index:10;
}
.resizer:hover,.resizer.active{background:var(--accent)}

/* ═══ FLOATING TOOLBAR ═══ */
.float-toolbar{
  position:fixed;display:none;flex-wrap:wrap;align-items:center;gap:3px;
  padding:6px 8px;background:var(--bg-surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);box-shadow:var(--shadow);z-index:9999;
  max-width:520px;
}
.float-toolbar.visible{display:flex;animation:ftFadeIn .15s ease}
@keyframes ftFadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ft-btn{
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  border:none;border-radius:6px;background:transparent;color:var(--text-muted);
  cursor:pointer;transition:var(--transition);font-size:13px;
}
.ft-btn:hover{background:var(--accent-glow);color:var(--accent)}
.ft-btn.active{background:var(--accent);color:#fff}
.ft-btn svg{width:14px;height:14px}
.ft-sep{width:1px;height:20px;background:var(--border);margin:0 2px}
.ft-select{
  padding:3px 6px;border:1px solid var(--border);border-radius:6px;
  background:var(--bg-panel);color:var(--text);font-size:11.5px;
  font-family:var(--font-ui);cursor:pointer;outline:none;max-width:110px;
}
.ft-select:focus{border-color:var(--accent)}
.ft-color{
  width:26px;height:26px;border:2px solid var(--border);border-radius:6px;
  cursor:pointer;padding:0;overflow:hidden;
}
.ft-color::-webkit-color-swatch-wrapper{padding:0}
.ft-color::-webkit-color-swatch{border:none;border-radius:4px}

/* ═══ MODALS ═══ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;z-index:10000;
}
.modal-overlay.visible{display:flex;animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:24px;width:90%;max-width:480px;box-shadow:0 16px 64px rgba(0,0,0,.5);
  animation:modalSlide .25s ease;
}
@keyframes modalSlide{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.modal h3 svg{width:20px;height:20px;color:var(--accent)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{
  width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg-panel);color:var(--text);font-size:13px;font-family:var(--font-ui);
  outline:none;transition:var(--transition);
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.img-preview-box{
  width:100%;height:120px;border:2px dashed var(--border);border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;color:var(--text-dim);
  font-size:13px;margin-bottom:12px;overflow:hidden;cursor:pointer;transition:var(--transition);
  position:relative;
}
.img-preview-box:hover{border-color:var(--accent);color:var(--accent)}
.img-preview-box img{max-width:100%;max-height:100%;object-fit:contain}

/* ═══ STATUS BAR ═══ */
.statusbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 12px;background:var(--bg-surface);border-top:1px solid var(--border);
  font-size:11px;color:var(--text-dim);flex-shrink:0;gap:12px;
}
.statusbar-left,.statusbar-right{display:flex;align-items:center;gap:12px}
.status-tag{
  padding:2px 8px;border-radius:4px;background:var(--accent-glow);
  color:var(--accent);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;
}

/* ═══ ELEMENT HIGHLIGHT ═══ */
.editor-highlight{outline:2px solid rgba(34,211,167,.5)!important;outline-offset:2px;cursor:pointer}
.editor-editing{outline:2px solid var(--accent)!important;outline-offset:2px;background:rgba(34,211,167,.03)!important}
.editor-img-highlight{outline:2px solid var(--info)!important;outline-offset:2px;cursor:pointer;position:relative}
.editor-link-indicator{text-decoration:underline wavy var(--accent)!important;cursor:pointer}

/* ═══ TOAST ═══ */
.toast-container{position:fixed;top:60px;right:16px;z-index:99999;display:flex;flex-direction:column;gap:8px}
.toast{
  padding:10px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;
  box-shadow:var(--shadow);animation:toastIn .3s ease;display:flex;align-items:center;gap:8px;
  max-width:320px;
}
.toast.success{background:#0d2818;border:1px solid #22d3a7;color:#22d3a7}
.toast.error{background:#2d0f14;border:1px solid var(--danger);color:var(--danger)}
.toast.info{background:#0f1a2d;border:1px solid var(--info);color:var(--info)}
[data-theme="light"] .toast.success{background:#e8faf4;color:#0a7a5a}
[data-theme="light"] .toast.error{background:#fce8eb;color:#c0293d}
[data-theme="light"] .toast.info{background:#e8f0fc;color:#2a6bbf}
@keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ═══ VIEW MODES ═══ */
[data-view="code"] .panel-preview,[data-view="code"] .resizer{display:none}
[data-view="code"] .panel-code{width:100%}
[data-view="preview"] .panel-code,[data-view="preview"] .resizer{display:none}
[data-view="preview"] .panel-preview{width:100%}
[data-view="split"] .panel-code{width:50%}

/* ═══ EMPTY STATE ═══ */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--text-dim);text-align:center;padding:40px;gap:12px;
}
.empty-state svg{width:48px;height:48px;opacity:.3}
.empty-state p{font-size:14px;max-width:300px;line-height:1.6}
.empty-state kbd{
  padding:2px 8px;border:1px solid var(--border);border-radius:4px;
  background:var(--bg-elevated);font-family:var(--font-code);font-size:11px;
}

/* scrollbar */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--border-hover)}

/* ═══ CONTEXT MENU ═══ */
.ctx-menu{
  position:fixed;display:none;background:var(--bg-surface);border:1px solid var(--border);
  border-radius:var(--radius);box-shadow:var(--shadow);padding:4px;z-index:99999;min-width:180px;
}
.ctx-menu.visible{display:block;animation:ftFadeIn .12s ease}
.ctx-item{
  display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:6px;
  font-size:12.5px;cursor:pointer;color:var(--text);transition:var(--transition);border:none;
  background:none;width:100%;text-align:left;font-family:var(--font-ui);
}
.ctx-item:hover{background:var(--accent-glow);color:var(--accent)}
.ctx-item svg{width:14px;height:14px;color:var(--text-muted)}
.ctx-item:hover svg{color:var(--accent)}

/* Responsive */
@media(max-width:768px){
  .toolbar{gap:3px;padding:6px 8px}
  .btn span.label{display:none}
  .btn{padding:6px 8px}
}
</style>
</head>
<body data-view="split">

<!-- ═══ TOOLBAR ═══ -->
<div class="toolbar">
  <div class="toolbar-brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
    HTML Editor
  </div>
  <div class="toolbar-sep"></div>

  <button class="btn primary" onclick="loadHTML()" title="Tải HTML vào Preview">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
    <span class="label">Tải Preview</span>
  </button>
  <button class="btn" onclick="getCode()" title="Lấy code HTML đã chỉnh sửa">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    <span class="label">Lấy Code</span>
  </button>
  <button class="btn" onclick="exportFile()" title="Tải xuống file HTML">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span class="label">Xuất File</span>
  </button>

  <div class="toolbar-sep"></div>

  <button class="btn" onclick="showYouTubeModal()" title="Thêm video YouTube">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="4"/><polygon points="10 8 16 12 10 16" fill="currentColor" stroke="none"/></svg>
    <span class="label">YouTube</span>
  </button>
  <button class="btn" onclick="showImageModal()" title="Thêm hình ảnh">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    <span class="label">Ảnh</span>
  </button>
  <button class="btn" onclick="showLinkModal()" title="Thêm liên kết">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
    <span class="label">Link</span>
  </button>

  <div class="toolbar-sep"></div>

  <button class="btn" onclick="doUndo()" title="Hoàn tác (Ctrl+Z)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
  </button>
  <button class="btn" onclick="doRedo()" title="Làm lại (Ctrl+Y)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.13-9.36L23 10"/></svg>
  </button>

  <div class="toolbar-sep"></div>

  <div class="btn-group">
    <button class="btn" data-view-btn="code" onclick="setView('code')">Code</button>
    <button class="btn active" data-view-btn="split" onclick="setView('split')">Chia đôi</button>
    <button class="btn" data-view-btn="preview" onclick="setView('preview')">Preview</button>
  </div>

  <div class="toolbar-sep"></div>

  <div class="btn-group">
    <button class="btn active" data-resp-btn="desktop" onclick="setResponsive('desktop')" title="Desktop">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    </button>
    <button class="btn" data-resp-btn="tablet" onclick="setResponsive('tablet')" title="Tablet">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
    </button>
    <button class="btn" data-resp-btn="mobile" onclick="setResponsive('mobile')" title="Mobile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
    </button>
  </div>

  <div style="flex:1"></div>

  <button class="btn" onclick="toggleTheme()" title="Đổi theme">
    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  </button>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <!-- Code Panel -->
  <div class="panel panel-code">
    <div class="panel-header">
      <span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        HTML Code
      </span>
      <span id="charCount" style="font-weight:400;text-transform:none;letter-spacing:0">0 ký tự</span>
    </div>
    <div class="code-wrap">
      <div class="line-numbers" id="lineNumbers">1</div>
      <textarea id="codeEditor" placeholder="Dán code HTML vào đây...&#10;&#10;Sau đó nhấn nút &quot;Tải Preview&quot; để xem và chỉnh sửa trực quan." spellcheck="false"></textarea>
    </div>
  </div>

  <!-- Resizer -->
  <div class="resizer" id="resizer"></div>

  <!-- Preview Panel -->
  <div class="panel panel-preview">
    <div class="panel-header">
      <span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Preview
      </span>
      <span id="previewSize">100%</span>
    </div>
    <div class="preview-container">
      <div class="preview-frame-wrap" id="previewWrap">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          <p>Dán code HTML vào bên trái rồi nhấn <kbd>Tải Preview</kbd> để bắt đầu chỉnh sửa trực quan</p>
        </div>
        <iframe id="previewFrame" style="display:none"></iframe>
      </div>
    </div>
  </div>
</div>

<!-- ═══ FLOATING TOOLBAR ═══ -->
<div class="float-toolbar" id="floatToolbar">

    <option value="Verdana">Verdana</option>
    <option value="Tahoma">Tahoma</option>
    <option value="Trebuchet MS">Trebuchet MS</option>
    <option value="Courier New">Courier New</option>
    <option value="Helvetica">Helvetica</option>
    <option value="Palatino">Palatino</option>
    <option value="Garamond">Garamond</option>
    <option value="Comic Sans MS">Comic Sans MS</option>
    <option value="Impact">Impact</option>
  </select>
  <select class="ft-select" id="ftSize" onchange="execFontSize(this.value)" title="Cỡ chữ" style="width:65px">
    <option value="">— Cỡ —</option>

    <option value="14px">14px</option>

    <option value="20px">20px</option>
    <option value="24px">24px</option>
    <option value="28px">28px</option>
    <option value="32px">32px</option>
    <option value="36px">36px</option>
    <option value="42px">42px</option>
    <option value="48px">48px</option>
    <option value="56px">56px</option>
    <option value="64px">64px</option>
    <option value="72px">72px</option>
  </select>

<!-- ═══ TOAST CONTAINER ═══ -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let undoStack = [], redoStack = [], currentHTML = '';
let ctxTarget = null, editingTarget = null, savedRange = null;
let imageTarget = null, ytTarget = null;
let isDragging = false;

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function $(id){ return document.getElementById(id) }
function toast(msg, type='success'){
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = (type==='success'?'✓':type==='error'?'✗':'ℹ') + '&nbsp;&nbsp;' + msg;
  $('toastContainer').appendChild(t);
  setTimeout(()=>{ t.style.transition='all .3s'; t.style.opacity='0'; t.style.transform='translateX(100%)'; setTimeout(()=>t.remove(),300) },2500);
}
function closeModal(id){ $(id).classList.remove('visible'); $(id).style.display='none' }
function openModal(id){ $(id).style.display='flex'; requestAnimationFrame(()=> $(id).classList.add('visible')) }
function getPreviewDoc(){ try{ return $('previewFrame').contentDocument || $('previewFrame').contentWindow.document }catch(e){return null} }

// ═══════════════════════════════════════
//  CODE EDITOR
// ═══════════════════════════════════════
const editor = $('codeEditor');
const lineNums = $('lineNumbers');

function updateLineNumbers(){
  const lines = editor.value.split('\n').length;
  let html = '';
  for(let i=1;i<=lines;i++) html += i + '\n';
  lineNums.textContent = html;
  $('charCount').textContent = editor.value.length.toLocaleString() + ' ký tự';
}

editor.addEventListener('input', updateLineNumbers);
editor.addEventListener('scroll', function(){ lineNums.scrollTop = this.scrollTop });
editor.addEventListener('keydown', function(e){
  if(e.key === 'Tab'){
    e.preventDefault();
    const start = this.selectionStart, end = this.selectionEnd;
    this.value = this.value.substring(0,start) + '  ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 2;
    updateLineNumbers();
  }
});

// ═══════════════════════════════════════
//  LOAD HTML INTO PREVIEW
// ═══════════════════════════════════════
function loadHTML(){
  const code = editor.value.trim();
  if(!code){ toast('Chưa có code HTML để tải','error'); return }

  pushUndo();
  currentHTML = code;

  $('emptyState').style.display = 'none';
  const frame = $('previewFrame');
  frame.style.display = 'block';

  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write(code);
  doc.close();

  // Wait for content to load then attach handlers
  setTimeout(()=> setupPreviewInteractions(), 200);

  $('statusMode').textContent = 'Đang chỉnh sửa';
  toast('Đã tải HTML vào Preview');
}

// ═══════════════════════════════════════
//  PREVIEW INTERACTIONS
// ═══════════════════════════════════════
function setupPreviewInteractions(){
  const doc = getPreviewDoc();
  if(!doc) return;

  // Inject editing styles
  const style = doc.createElement('style');
  style.textContent = `
    .editor-highlight{outline:2px solid rgba(34,211,167,.5)!important;outline-offset:2px}
    .editor-editing{outline:2px solid #22d3a7!important;outline-offset:2px;min-height:1em}
    .editor-img-highlight{outline:2px solid #4799f0!important;outline-offset:2px;cursor:pointer}
    [contenteditable="true"]:focus{outline:2px solid #22d3a7!important;outline-offset:2px}
    *{cursor:default}
    a,button,[role="button"]{cursor:pointer}
    img{cursor:pointer}
    iframe{pointer-events:auto}
  `;
  doc.head.appendChild(style);

  // Mouse move - highlight
  doc.addEventListener('mouseover', function(e){
    if(editingTarget) return;
    doc.querySelectorAll('.editor-highlight,.editor-img-highlight').forEach(el=>{
      el.classList.remove('editor-highlight','editor-img-highlight');
    });
    if(e.target === doc.body || e.target === doc.documentElement) return;
    if(e.target.tagName === 'IMG') e.target.classList.add('editor-img-highlight');
    else e.target.classList.add('editor-highlight');

    // Update element path in statusbar
    updateElementPath(e.target);
  });

  // Click handler
  doc.addEventListener('click', function(e){
    e.preventDefault();
    e.stopPropagation();
    const el = e.target;

    // Image click
    if(el.tagName === 'IMG'){
      imageTarget = el;
      $('imgUrlInput').value = el.src || '';
      $('imgAltInput').value = el.alt || '';
      $('imgPreviewImg').src = el.src || '';
      $('imgPreviewImg').style.display = el.src ? 'block' : 'none';
      $('imgPreviewText').style.display = el.src ? 'none' : 'block';
      scrollCodeToElement(el);
      openModal('imgModal');
      return;
    }

    // YouTube iframe click
    if(el.tagName === 'IFRAME' && el.src && el.src.includes('youtube')){
      ytTarget = el;
      const match = el.src.match(/embed\/([^?&#]+)/);
      $('ytUrlInput').value = match ? 'https://www.youtube.com/watch?v=' + match[1] : el.src;
      $('ytWidthInput').value = el.width || el.style.width || '100%';
      $('ytHeightInput').value = el.height || el.style.height || '315';
      scrollCodeToElement(el);
      openModal('ytModal');
      return;
    }

    // Text element - make editable
    const editableTags = ['H1','H2','H3','H4','H5','H6','P','SPAN','A','BUTTON','LI','TD','TH','LABEL','STRONG','EM','B','I','U','SMALL','BLOCKQUOTE','FIGCAPTION','DIV'];
    if(editableTags.includes(el.tagName) || el.closest && editableTags.some(t => el.tagName === t)){
      startEditing(el);
    }
  });

  // Right click - context menu
  doc.addEventListener('contextmenu', function(e){
    e.preventDefault();
    ctxTarget = e.target;
    showContextMenu(e);
  });

  // Selection change - show floating toolbar
  doc.addEventListener('mouseup', function(e){
    setTimeout(()=>{
      const sel = doc.getSelection();
      if(sel && sel.toString().trim().length > 0 && editingTarget){
        showFloatToolbar(e);
        savedRange = sel.getRangeAt(0);
      }
    }, 50);
  });

  // Click outside editing element
  doc.addEventListener('mousedown', function(e){
    if(editingTarget && e.target !== editingTarget && !editingTarget.contains(e.target)){
      stopEditing();
    }
  });

  // Handle drag-drop images
  doc.addEventListener('dragover', function(e){ e.preventDefault() });
  doc.addEventListener('drop', function(e){
    e.preventDefault();
    const files = e.dataTransfer.files;
    if(files.length && files[0].type.startsWith('image/')){
      const img = e.target.closest('img') || e.target;
      if(img.tagName === 'IMG'){
        imageTarget = img;
        handleDroppedImage(files[0]);
      }
    }
  });
}

function startEditing(el){
  if(editingTarget) stopEditing();
  pushUndo();
  editingTarget = el;
  el.contentEditable = 'true';
  el.classList.add('editor-editing');
  el.focus();
  $('statusMode').textContent = 'Đang sửa text';
  scrollCodeToElement(el);
}

// ═══════════════════════════════════════
//  SCROLL CODE TO ELEMENT
// ═══════════════════════════════════════
function scrollCodeToElement(el){
  if(!el) return;
  const code = editor.value;
  const tag = el.tagName.toLowerCase();
  const text = el.textContent.trim();

  // Build search candidates to find the element in source code
  let searchPatterns = [];

  // 1. Try matching by id
  if(el.id){
    searchPatterns.push('id="' + el.id + '"');
  }

  // 2. Try matching by unique class (skip editor classes)
  const origClass = (el.getAttribute('class') || '').replace(/editor-[a-z-]+/g,'').trim();
  if(origClass){
    searchPatterns.push('class="' + origClass + '"');
    // Also try partial class match (first class name)
    const firstClass = origClass.split(/\s+/)[0];
    if(firstClass) searchPatterns.push('class="' + firstClass);
  }

  // 3. Try matching by tag + text content (first 40 chars)
  if(text.length > 0){
    const snippet = text.substring(0, 40).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    searchPatterns.push(snippet);
  }

  // 4. Try matching opening tag with attributes
  if(el.tagName === 'IMG' && el.getAttribute('src')){
    const src = el.getAttribute('src').substring(0, 60);
    searchPatterns.push(src);
  }
  if(el.tagName === 'A' && el.getAttribute('href')){
    searchPatterns.push('href="' + el.getAttribute('href'));
  }

  // Search through patterns, find best match
  let bestPos = -1;
  for(const pattern of searchPatterns){
    if(!pattern || pattern.length < 3) continue;
    const idx = code.indexOf(pattern);
    if(idx !== -1){
      bestPos = idx;
      break;
    }
    // Try case-insensitive
    const idxLower = code.toLowerCase().indexOf(pattern.toLowerCase());
    if(idxLower !== -1){
      bestPos = idxLower;
      break;
    }
  }

  if(bestPos === -1) return;

  // Calculate line number from position
  const linesBeforeMatch = code.substring(0, bestPos).split('\n').length;
  const lineHeight = parseFloat(getComputedStyle(editor).lineHeight) || 19.2;

  // Scroll code editor to that line (center it)
  const scrollTarget = (linesBeforeMatch - 1) * lineHeight - editor.clientHeight / 3;
  editor.scrollTop = Math.max(0, scrollTarget);
  lineNums.scrollTop = editor.scrollTop;

  // Also set cursor position in editor
  editor.setSelectionRange(bestPos, bestPos);

  // Highlight the line briefly
  highlightCodeLine(linesBeforeMatch);
}

function highlightCodeLine(lineNum){
  // Flash the line number to indicate which line
  const nums = lineNums.textContent.split('\n');
  // Create a visual indicator by temporarily styling
  const lineHeight = parseFloat(getComputedStyle(editor).lineHeight) || 19.2;
  const topOffset = (lineNum - 1) * lineHeight - editor.scrollTop;

  // Create highlight overlay
  let hl = document.getElementById('codeHighlight');
  if(!hl){
    hl = document.createElement('div');
    hl.id = 'codeHighlight';
    hl.style.cssText = 'position:absolute;left:0;right:0;height:' + lineHeight + 'px;background:var(--accent-glow);border-left:3px solid var(--accent);pointer-events:none;transition:opacity .6s;z-index:5;';
    document.querySelector('.code-wrap').appendChild(hl);
  }
  hl.style.top = (topOffset + 12) + 'px'; // 12px = padding-top of editor
  hl.style.opacity = '1';
  hl.style.height = lineHeight + 'px';
  setTimeout(()=>{ hl.style.opacity = '0' }, 1500);
}

function stopEditing(){
  if(!editingTarget) return;
  editingTarget.contentEditable = 'false';
  editingTarget.classList.remove('editor-editing');
  editingTarget = null;
  hideFloatToolbar();
  syncCodeFromPreview();
  $('statusMode').textContent = 'Đang chỉnh sửa';
}

// ═══════════════════════════════════════
//  FLOATING TOOLBAR
// ═══════════════════════════════════════
function showFloatToolbar(e){
  const ft = $('floatToolbar');
  const doc = getPreviewDoc();
  if(!doc) return;
  const sel = doc.getSelection();
  if(!sel.rangeCount) return;

  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  const frameRect = $('previewFrame').getBoundingClientRect();

  const ftHeight = ft.offsetHeight || 44;
  let left = frameRect.left + rect.left + rect.width/2 - 260;
  let top = frameRect.top + rect.top - ftHeight - 12;

  if(left < 8) left = 8;
  if(left + 520 > window.innerWidth) left = window.innerWidth - 530;
  // If toolbar would go above viewport or behind main toolbar, show below selection instead
  if(top < 56) top = frameRect.top + rect.bottom + 10;

  ft.style.left = left + 'px';
  ft.style.top = top + 'px';
  ft.classList.add('visible');
}

function hideFloatToolbar(){
  $('floatToolbar').classList.remove('visible');
}

// ═══════════════════════════════════════
//  EXEC COMMANDS (on preview iframe)
// ═══════════════════════════════════════
function execCmd(cmd, val){
  const doc = getPreviewDoc();
  if(!doc) return;

  // Restore selection if needed
  if(savedRange){
    const sel = doc.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRange);
  }

  doc.execCommand(cmd, false, val || null);
  syncCodeFromPreview();
}

function execFontSize(size){
  const doc = getPreviewDoc();
  if(!doc || !size) return;

  if(savedRange){
    const sel = doc.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRange);
  }

  // Use fontSize command with a temporary value, then replace
  doc.execCommand('fontSize', false, '7');
  const fontEls = doc.querySelectorAll('font[size="7"]');
  fontEls.forEach(el => {
    el.removeAttribute('size');
    el.style.fontSize = size;
  });
  // Also handle spans

function showContextMenu(e){
  const menu = $('ctxMenu');
  const frameRect = $('previewFrame').getBoundingClientRect();
  let left = frameRect.left + e.clientX;
  let top = frameRect.top + e.clientY;

  if(left + 200 > window.innerWidth) left = window.innerWidth - 210;
  if(top + 250 > window.innerHeight) top = window.innerHeight - 260;

  menu.style.left = left + 'px';
  menu.style.top = top + 'px';
  menu.classList.add('visible');

  // Show/hide relevant items based on target
  const items = menu.querySelectorAll('.ctx-item');
  items[1].style.display = ctxTarget.tagName === 'IMG' ? 'flex' : 'none'; // Change image
  items[3].style.display = (ctxTarget.tagName === 'IFRAME' && ctxTarget.src && ctxTarget.src.includes('youtube')) ? 'flex' : 'none'; // YouTube
  items[2].style.display = (ctxTarget.tagName === 'A' || ctxTarget.closest('a')) ? 'flex' : 'none'; // Edit link
}

function parseYouTubeId(url){
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^?&#]+)/,
    /youtube\.com\/shorts\/([^?&#]+)/
  ];
  for(const p of patterns){
    const m = url.match(p);
    if(m) return m[1];
  }
  return null;
}

function applyYouTube(){
  const doc = getPreviewDoc();
  if(!doc){ toast('Chưa tải HTML','error'); return }

  const url = $('ytUrlInput').value.trim();
  const id = parseYouTubeId(url);
  if(!id){ toast('URL YouTube không hợp lệ','error'); return }

  pushUndo();
  const embedUrl = 'https://www.youtube.com/embed/' + id;
  const w = $('ytWidthInput').value || '100%';
  const h = $('ytHeightInput').value || '315';

  if(ytTarget){
    ytTarget.src = embedUrl;
    ytTarget.width = w;
    ytTarget.height = h;
  } else {
    const wrapper = doc.createElement('div');
    wrapper.style.cssText = 'position:relative;width:100%;max-width:' + (w.includes('%') ? w : w+'px');
    const iframe = doc.createElement('iframe');
    iframe.src = embedUrl;
    iframe.width = w;
    iframe.height = h;
    iframe.frameBorder = '0';
    iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
    iframe.allowFullscreen = true;
    iframe.style.cssText = 'border:none;max-width:100%';
    wrapper.appendChild(iframe);
    doc.body.appendChild(wrapper);
  }

  syncCodeFromPreview();
  closeModal('ytModal');
  toast('Đã cập nhật video YouTube');
}

function showLinkModal(){

  $('linkTextInput').value = '';
  $('linkTargetInput').value = '_blank';
  openModal('linkModal');
}

function showLinkModalFromSelection(){
  const doc = getPreviewDoc();
  if(!doc) return;
  const sel = doc.getSelection();
  if(sel && sel.toString().trim()){
    savedRange = sel.getRangeAt(0);
    $('linkTextInput').value = sel.toString();

    // Check if already a link
    const anchor = sel.anchorNode.parentElement.closest('a');
    if(anchor){
      $('linkUrlInput').value = anchor.href;
      $('linkTargetInput').value = anchor.target || '_blank';
    } else {
      $('linkUrlInput').value = '';
      $('linkTargetInput').value = '_blank';
    }
    openModal('linkModal');
  }
}

function applyLink(){
  const doc = getPreviewDoc();
  if(!doc){ toast('Chưa tải HTML','error'); return }

  const url = $('linkUrlInput').value.trim();
  if(!url){ toast('Chưa nhập URL','error'); return }

  pushUndo();
  const text = $('linkTextInput').value;
  const target = $('linkTargetInput').value;

  // If editing an existing link from context menu
  if(editingTarget && editingTarget.tagName === 'A'){
    editingTarget.href = url;
    editingTarget.target = target;
    if(text) editingTarget.textContent = text;
    editingTarget.contentEditable = 'false';
    editingTarget = null;
  }
  // If we have a saved range from selection
  else if(savedRange){
    const sel = doc.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRange);
    doc.execCommand('createLink', false, url);

    // Set target on the created link
    const links = doc.querySelectorAll('a[href="'+CSS.escape(url)+'"]');
    links.forEach(a => { a.target = target });
    savedRange = null;
  }
  // Insert new link at end
  else {
    const a = doc.createElement('a');
    a.href = url;
    a.target = target;
    a.textContent = text || url;
    doc.body.appendChild(a);
  }

  syncCodeFromPreview();
  closeModal('linkModal');
  toast('Đã cập nhật link');
}

function removeLink(){
  const doc = getPreviewDoc();
  if(!doc) return;
  doc.execCommand('unlink');
  syncCodeFromPreview();
}

// ═══════════════════════════════════════
//  UNDO / REDO
// ═══════════════════════════════════════
function pushUndo(){
  const doc = getPreviewDoc();
  if(!doc) return;
  // Clean up editing classes before saving
  const clone = doc.body.cloneNode(true);
  clone.querySelectorAll('.editor-highlight,.editor-editing,.editor-img-highlight').forEach(el=>{
    el.classList.remove('editor-highlight','editor-editing','editor-img-highlight');
  });
  clone.querySelectorAll('[contenteditable]').forEach(el=>el.removeAttribute('contenteditable'));
  undoStack.push(clone.innerHTML);
  if(undoStack.length > 50) undoStack.shift();
  redoStack = [];
}

function doUndo(){
  if(!undoStack.length){ toast('Không có gì để hoàn tác','info'); return }
  const doc = getPreviewDoc();
  if(!doc) return;
  redoStack.push(doc.body.innerHTML);
  doc.body.innerHTML = undoStack.pop();
  setupPreviewInteractions();
  syncCodeFromPreview();
  toast('Đã hoàn tác');
}

function doRedo(){
  if(!redoStack.length){ toast('Không có gì để làm lại','info'); return }
  const doc = getPreviewDoc();
  if(!doc) return;
  undoStack.push(doc.body.innerHTML);
  doc.body.innerHTML = redoStack.pop();
  setupPreviewInteractions();
  syncCodeFromPreview();
  toast('Đã làm lại');
}

// ═══════════════════════════════════════
//  SYNC CODE
// ═══════════════════════════════════════
function syncCodeFromPreview(){
  const doc = getPreviewDoc();
  if(!doc) return;

  // Get the full HTML including head
  const html = doc.documentElement.outerHTML;

  // Clean up editor artifacts
  let cleaned = html
    .replace(/ class="editor-highlight"/g, '')
    .replace(/ class="editor-editing"/g, '')
    .replace(/ class="editor-img-highlight"/g, '')
    .replace(/ contenteditable="true"/g, '')
    .replace(/ contenteditable="false"/g, '')
    .replace(/ class=""/g, '');

  // Remove injected style tag
  cleaned = cleaned.replace(/<style>\s*\.editor-highlight[\s\S]*?<\/style>/g, '');

  // Wrap with doctype if original had it
  if(currentHTML.toLowerCase().includes('<!doctype')){
    cleaned = '<!DOCTYPE html>\n' + cleaned;
  }

  editor.value = cleaned;
  currentHTML = cleaned;
  updateLineNumbers();
}

// ═══════════════════════════════════════
//  GET CODE / EXPORT
// ═══════════════════════════════════════
function getCode(){
  syncCodeFromPreview();
  const code = editor.value;
  if(!code){ toast('Không có code','error'); return }

  navigator.clipboard.writeText(code).then(()=>{
    toast('Đã copy code HTML vào clipboard');
  }).catch(()=>{
    // Fallback
    editor.select();
    document.execCommand('copy');
    toast('Đã copy code HTML');
  });
}

function exportFile(){
  syncCodeFromPreview();
  const code = editor.value;
  if(!code){ toast('Không có code để xuất','error'); return }

  const blob = new Blob([code], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'edited-page.html';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Đã tải xuống file HTML');
}

//  RESIZER
// ═══════════════════════════════════════
const resizer = $('resizer');
const codePanel = document.querySelector('.panel-code');

resizer.addEventListener('mousedown', function(e){
  isDragging = true;
  resizer.classList.add('active');
  document.addEventListener('mousemove', onResize);
  document.addEventListener('mouseup', stopResize);
  e.preventDefault();
});

function onResize(e){
  if(!isDragging) return;
  const containerWidth = document.querySelector('.main').offsetWidth;
  const newWidth = (e.clientX / containerWidth) * 100;
  if(newWidth > 15 && newWidth < 85){
    codePanel.style.width = newWidth + '%';
  }
}

function stopResize(){
  isDragging = false;
  resizer.classList.remove('active');
  document.removeEventListener('mousemove', onResize);
  document.removeEventListener('mouseup', stopResize);
}

// ═══════════════════════════════════════
//  ELEMENT PATH
// ═══════════════════════════════════════
function updateElementPath(el){
  if(!el) return;
  let path = [];
  let current = el;
  while(current && current.tagName && current.tagName !== 'HTML'){
    let name = current.tagName.toLowerCase();
    if(current.id) name += '#' + current.id;
    else if(current.className && typeof current.className === 'string'){
      const cls = current.className.replace(/editor-[a-z-]+/g,'').trim();
      if(cls) name += '.' + cls.split(/\s+/).slice(0,2).join('.');
    }
    path.unshift(name);
    current = current.parentElement;
  }
  $('elementPath').textContent = path.join(' › ');
}

// ═══════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ═══════════════════════════════════════
document.addEventListener('keydown', function(e){
  if((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey){
    // Only intercept if not in code editor
    if(document.activeElement !== editor){
      e.preventDefault();
      doUndo();
    }
  }
  if((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))){
    if(document.activeElement !== editor){
      e.preventDefault();
      doRedo();
    }
  }
  if(e.key === 'Escape'){
    if(editingTarget) stopEditing();
    document.querySelectorAll('.modal-overlay.visible').forEach(m=>{ m.classList.remove('visible'); m.style.display='none' });
    $('ctxMenu').classList.remove('visible');
    hideFloatToolbar();
  }
  // Ctrl+Enter to load HTML
  if((e.ctrlKey || e.metaKey) && e.key === 'Enter'){
    e.preventDefault();
    loadHTML();
  }
});

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay=>{
  overlay.addEventListener('click', function(e){
    if(e.target === this){ this.classList.remove('visible'); this.style.display='none' }
  });
});
